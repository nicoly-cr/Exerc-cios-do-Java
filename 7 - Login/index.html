<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - JavaScript</title>
</head>
<body>
    
    <!--Bloco JavaScript - Login-->

    <script>
    
        let usuario = prompt("Digite o usuário: ");
        let senha = prompt("Digite a senha: ");

        if(usuario === "admin" && senha === "1234"){
            alert("Acesso permitido.");
        } else {
            alert("Acesso negado.");
        }
    
    </script>

</body>
</html>
