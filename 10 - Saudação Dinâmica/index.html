<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saudação Dinâmica - JavaScript</title>
</head>
<body>

    <!--Campo de Interação-->

    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="exibirMensagem()">Enviar</button>

    <!--Bloco JavaScript - Saudação Dinâmica-->

    <script>
    
    function exibirMensagem(){
        let nome = document.getElementById("nome").value;
        alert("Olá, " + nome);
    }

    </script>

</body>
</html>
