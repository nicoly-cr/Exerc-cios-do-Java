<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Condição Lógica - JavaScript</title>
</head>
<body>
    
    <!--Bloco JavaScript - Condição Lógica-->

    <script>
    
        let idade = Number(prompt("Digite sua idade:  "));
        
        if (idade >= 18){
            alert("Você é maior de idade.");
        } else {
            alert("Você é menor de idade.");
        }
    
    </script>

</body>
</html>
