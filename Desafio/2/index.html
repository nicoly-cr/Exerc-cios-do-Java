<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Desafio 2 - JavaScript</title>
</head>
<body>

    <!-- Bloco JavaScript - Desafio 2 -->
     
    <script>
        let nota = Number(prompt("Digite sua nota:"));

        if (nota >= 4 && nota <= 5.99) {
            alert("Você está de recuperação.");
        } else if (nota >= 6) {
            alert("Você está aprovado.");
        } else {
            alert("Você está reprovado.");
        }
    </script>

</body>
</html>
